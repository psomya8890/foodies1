name: Security Scan & Deploy

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run npm audit (block on critical)
        run: cd backend && npm audit --audit-level=critical

      - name: Run Snyk dependency scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=critical --file=backend/package.json

  image-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    needs: dependency-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t foodies1-backend:${{ github.sha }} ./backend

      - name: Build frontend Docker image
        run: docker build -t foodies1-frontend:${{ github.sha }} ./frontend

      - name: Trivy scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: foodies1-backend:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Trivy scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: foodies1-frontend:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: image-scan
    if: github.event_name == 'push'
    steps:
      - name: Deploy to EC2 via SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "=== Key first line ==="
          head -1 ~/.ssh/id_rsa
          echo "=== Key last line ==="
          tail -1 ~/.ssh/id_rsa
          echo "=== Line count ==="
          wc -l ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/id_rsa -v ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo connected" 2>&1 | head -30
